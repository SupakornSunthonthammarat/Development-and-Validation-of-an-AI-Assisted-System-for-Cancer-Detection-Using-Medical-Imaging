services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oncovision
      POSTGRES_PASSWORD: oncovision
      POSTGRES_DB: oncovision
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oncovision"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://oncovision:oncovision@db:5432/oncovision
      STORAGE_ROOT: /app/backend/storage
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/backend/storage
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_storage:
