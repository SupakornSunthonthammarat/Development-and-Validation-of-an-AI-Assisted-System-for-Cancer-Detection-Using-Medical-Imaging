services:
  - type: web
    name: oncovision-backend
    runtime: python
    plan: free                      # free tier ไม่รองรับดิสก์ถาวร -> storage เป็น ephemeral
    buildCommand: ./render-build.sh
    startCommand: ./render-start.sh
    healthCheckPath: /health
    # NOTE: free tier ไม่รองรับ persistent disk
    # ถ้าต้องการให้รูป/report ไม่หายเวลา restart -> เปลี่ยน plan เป็น starter
    # แล้วเพิ่ม block disk: { name, mountPath: /var/data, sizeGB: 1 } กลับมา + ตั้ง STORAGE_ROOT=/var/data
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: STORAGE_ROOT
        value: /tmp/oncovision-storage   # โฟลเดอร์ที่เขียนได้บน free tier (ephemeral)
      - key: JWT_SECRET
        generateValue: true         # Render สุ่ม secret ให้เอง
      - key: DATABASE_URL
        fromDatabase:
          name: oncovision-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://development-and-validation-of-an-ai.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false                 # ใส่เองในหน้า Render dashboard (ถ้าเปิดใช้ Google login)
      - key: OPENAI_API_KEY
        sync: false                 # ใส่เองถ้าจะเปิด AI assistant

databases:
  - name: oncovision-db
    plan: free
    databaseName: oncovision
    user: oncovision
